    <g>
      <rect width="220" height="285" rx="8" fill="#111" stroke="#9b7743" stroke-opacity=".55"/><circle cx="110" cy="102" r="62" fill="#9d7145"/><path d="M56 232h108" stroke="#c6a269"/><text x="54" y="252" fill="#fff" font-family="Arial" font-size="18">EDEN SKYE</text>
    </g>
    <g transform="translate(250)"><rect width="220" height="285" rx="8" fill="#111" stroke="#9b7743" stroke-opacity=".55"/><circle cx="110" cy="102" r="62" fill="#c8b8a1"/><path d="M56 232h108" stroke="#c6a269"/><text x="42" y="252" fill="#fff" font-family="Arial" font-size="18">SOLARA VANE</text></g>
    <g transform="translate(500)"><rect width="220" height="285" rx="8" fill="#111" stroke="#9b7743" stroke-opacity=".55"/><circle cx="110" cy="102" r="62" fill="#a97452"/><path d="M56 232h108" stroke="#c6a269"/><text x="54" y="252" fill="#fff" font-family="Arial" font-size="18">LIORA VALE</text></g>
    <g transform="translate(750)"><rect width="220" height="285" rx="8" fill="#111" stroke="#9b7743" stroke-opacity=".55"/><circle cx="110" cy="102" r="62" fill="#815230"/><path d="M56 232h108" stroke="#c6a269"/><text x="62" y="252" fill="#fff" font-family="Arial" font-size="18">NOVA RAIN</text></g>
    <g transform="translate(1000)"><rect width="220" height="285" rx="8" fill="#111" stroke="#9b7743" stroke-opacity=".55"/><circle cx="110" cy="102" r="62" fill="#62402c"/><path d="M56 232h108" stroke="#c6a269"/><text x="43" y="252" fill="#fff" font-family="Arial" font-size="18">CELESTE NOIR</text></g>
  </g>

  <text x="610" y="1240" fill="#f1d6a4" font-family="Georgia, serif" font-size="36" letter-spacing="5">SHOP LUXURY PRODUCTS</text>
