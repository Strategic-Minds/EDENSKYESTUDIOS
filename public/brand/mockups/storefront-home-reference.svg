    <rect width="1600" height="105" fill="#070707"/>
    <g fill="none" stroke="#9b7743" stroke-opacity=".45"><path d="M260 0v105M520 0v105M780 0v105M1040 0v105M1300 0v105"/></g>
    <g fill="#f2efe7" font-family="Arial, sans-serif" font-size="20" font-weight="700">
