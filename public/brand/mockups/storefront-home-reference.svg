<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">Eden Skye Studios storefront mockup reference</title>
  <desc id="desc">Dark luxury storefront with Eden Skye hero, creator rail, product commerce, Black Card membership, and champagne metallic accents.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f1d6a4"/>
      <stop offset=".45" stop-color="#a87d45"/>
      <stop offset="1" stop-color="#f8e7bd"/>
    </linearGradient>
    <linearGradient id="silk" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#25160f"/>
      <stop offset=".45" stop-color="#b59668"/>
      <stop offset="1" stop-color="#332016"/>
    </linearGradient>
    <radialGradient id="glow" cx=".62" cy=".18" r=".55">
      <stop stop-color="#b78b51" stop-opacity=".58"/>
      <stop offset=".55" stop-color="#1a100b" stop-opacity=".78"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect width="1600" height="2200" fill="#050505"/>
  <rect width="1600" height="620" fill="url(#glow)"/>
  <path d="M0 620h1600M0 110h1600M0 1200h1600M0 1698h1600" stroke="#9b7743" stroke-opacity=".45"/>
  <text x="86" y="74" fill="url(#gold)" font-family="Georgia, serif" font-size="46" letter-spacing="4">ES EDEN SKYE</text>
  <text x="136" y="108" fill="#c8c0b2" font-family="Arial, sans-serif" font-size="16" letter-spacing="12">STUDIOS</text>
  <g fill="#f2efe7" font-family="Arial, sans-serif" font-size="18" letter-spacing="2">
    <text x="410" y="72">HOME</text><text x="510" y="72">CREATORS</text><text x="655" y="72">SHOP</text>
    <text x="740" y="72">MEMBERSHIP</text><text x="930" y="72">CHAT</text><text x="1025" y="72">LICENSES</text>
  </g>
  <rect x="1364" y="35" width="150" height="48" rx="7" fill="url(#gold)"/>
  <text x="1405" y="66" fill="#050505" font-family="Arial, sans-serif" font-size="16" font-weight="700">JOIN NOW</text>

  <g transform="translate(78 210)">
    <text fill="#f1d6a4" font-family="Georgia, serif" font-size="70" letter-spacing="4">
      <tspan x="0" y="0">LUXURY.</tspan><tspan x="0" y="88">CONNECTION.</tspan><tspan x="0" y="176">FREEDOM.</tspan>
    </text>
    <text x="0" y="245" fill="#f2efe7" font-family="Arial, sans-serif" font-size="24">
      <tspan x="0" dy="0">Connect with premium creators, chat in real time,</tspan>
      <tspan x="0" dy="36">download exclusive content, and shop gated offers.</tspan>
    </text>
    <rect x="0" y="315" width="240" height="56" rx="5" fill="url(#gold)"/>
    <text x="43" y="350" fill="#050505" font-family="Arial, sans-serif" font-size="18" font-weight="700">EXPLORE CREATORS</text>
    <rect x="270" y="315" width="170" height="56" rx="5" fill="none" stroke="#c6a269"/>
    <text x="315" y="350" fill="#f2efe7" font-family="Arial, sans-serif" font-size="18">JOIN NOW</text>
  </g>
  <g filter="url(#softShadow)">
    <ellipse cx="1135" cy="405" rx="185" ry="230" fill="#140d0a"/>
    <circle cx="1135" cy="285" r="90" fill="#b98958"/>
    <path d="M970 560c80-170 260-170 338 0v70H970z" fill="url(#silk)"/>
    <path d="M1024 252c64-82 196-65 246 20-78-20-158-18-246-20z" fill="#090706"/>
    <path d="M1070 300c40 32 90 33 132 0" stroke="#2a160f" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>

