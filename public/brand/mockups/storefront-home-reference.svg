  </g>
  <g fill="#f2efe7" font-family="Arial, sans-serif" font-size="20"><text x="112" y="1485">BLACK CARD</text><text x="365" y="1485">DIGITAL DROPS</text><text x="612" y="1485">LICENSES</text><text x="858" y="1485">SERVICES</text><text x="1106" y="1485">APPS</text><text x="1356" y="1485">BUNDLES</text></g>
  <g fill="#c6a269" font-family="Arial, sans-serif" font-size="23"><text x="112" y="1518">Waitlist</text><text x="365" y="1518">Draft</text><text x="612" y="1518">Review</text><text x="858" y="1518">Private</text><text x="1106" y="1518">Sandbox</text><text x="1356" y="1518">Gated</text></g>

  <g transform="translate(80 1635)">
    <rect width="590" height="330" fill="#0a0a0a" stroke="#9b7743" stroke-opacity=".55"/>
    <text x="36" y="64" fill="#f1d6a4" font-family="Georgia, serif" font-size="40">THE BLACK CARD</text>
    <text x="36" y="108" fill="#f1d6a4" font-family="Georgia, serif" font-size="32">VIP MEMBERSHIP</text>
    <text x="36" y="165" fill="#f2efe7" font-family="Arial" font-size="20">Unlimited messaging</text>
    <text x="36" y="204" fill="#f2efe7" font-family="Arial" font-size="20">Priority video access</text>
    <text x="36" y="243" fill="#f2efe7" font-family="Arial" font-size="20">Approved downloads</text>
    <rect x="340" y="82" width="180" height="120" rx="12" fill="#050505" stroke="#c6a269" transform="rotate(-8 430 142)"/>
    <text x="385" y="145" fill="url(#gold)" font-family="Georgia" font-size="32">ES</text>
  </g>
  <g transform="translate(720 1635)">
    <rect width="800" height="330" fill="#0a0a0a" stroke="#9b7743" stroke-opacity=".55"/>
    <text x="42" y="74" fill="#f1d6a4" font-family="Georgia, serif" font-size="36">BECOME A PARTNER</text>
    <text x="42" y="116" fill="#f1d6a4" font-family="Georgia, serif" font-size="24">LICENSE. COLLABORATE. EARN.</text>
    <text x="42" y="176" fill="#f2efe7" font-family="Arial" font-size="22">Use approved creator assets for brand, marketing, and business.</text>
    <rect x="42" y="230" width="160" height="52" rx="5" fill="url(#gold)"/>
    <text x="78" y="263" fill="#050505" font-family="Arial" font-weight="700" font-size="17">APPLY NOW</text>
  </g>
