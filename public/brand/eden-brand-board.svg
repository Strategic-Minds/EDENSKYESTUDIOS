<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Eden Skye Studios locked brand board</title>
  <desc id="desc">A neutral luxury brand board rendered from the Eden Skye Studios Drive brand pack: black, taupe, champagne, ivory, clean ES monogram, Belleza display direction, Montserrat support direction.</desc>
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2EFE7"/>
      <stop offset="0.42" stop-color="#C8C0B2"/>
      <stop offset="1" stop-color="#8C8172"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1E1E"/>
      <stop offset="0.55" stop-color="#0D0D0D"/>
      <stop offset="1" stop-color="#8C8172"/>
    </linearGradient>
  </defs>
  <rect width="1536" height="1024" fill="#0D0D0D"/>
  <rect x="70" y="72" width="1396" height="880" rx="36" fill="#111111" stroke="#C8C0B2" stroke-opacity="0.24"/>
  <circle cx="266" cy="296" r="132" fill="url(#metal)"/>
  <text x="266" y="323" text-anchor="middle" font-family="Georgia, serif" font-size="108" fill="#0D0D0D">ES</text>
  <text x="454" y="254" font-family="Georgia, serif" font-size="86" fill="#F2EFE7">Eden Skye Studios</text>
  <text x="458" y="314" font-family="Arial, sans-serif" font-size="30" fill="#C8C0B2">Premium AI luxury studio and curated reseller boutique</text>
  <line x1="458" y1="356" x2="1312" y2="356" stroke="#C8C0B2" stroke-opacity="0.28"/>
  <g font-family="Arial, sans-serif" font-size="24" fill="#F2EFE7">
    <text x="132" y="538">Locked Palette</text>
    <text x="132" y="746">Typography Direction</text>
    <text x="808" y="538">Website System</text>
    <text x="808" y="746">Logo Rules</text>
  </g>
  <g>
    <rect x="132" y="574" width="118" height="118" rx="16" fill="#0D0D0D" stroke="#F2EFE7" stroke-opacity="0.18"/>
    <rect x="274" y="574" width="118" height="118" rx="16" fill="#1E1E1E" stroke="#F2EFE7" stroke-opacity="0.18"/>
    <rect x="416" y="574" width="118" height="118" rx="16" fill="#8C8172"/>
    <rect x="558" y="574" width="118" height="118" rx="16" fill="#C8C0B2"/>
