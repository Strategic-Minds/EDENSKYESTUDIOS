  <text x="132" y="858" font-family="Arial, sans-serif" font-size="26" fill="#C8C0B2">Montserrat support: clean, premium, readable, mobile-first.</text>
  <rect x="808" y="574" width="596" height="118" rx="16" fill="url(#panel)" stroke="#C8C0B2" stroke-opacity="0.22"/>
  <text x="840" y="626" font-family="Arial, sans-serif" font-size="24" fill="#F2EFE7">Hero &gt; The Eden Edit &gt; Fictional AI story &gt; Trust &gt; Email capture &gt; Products &gt; Studio Notes</text>
