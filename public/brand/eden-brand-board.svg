  <g font-family="Arial, sans-serif" font-size="18" fill="#C8C0B2">
    <text x="132" y="718">#0D0D0D</text>
    <text x="274" y="718">#1E1E1E</text>
    <text x="416" y="718">#8C8172</text>
    <text x="558" y="718">#C8C0B2</text>
