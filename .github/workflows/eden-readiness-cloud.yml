name: Eden Readiness Cloud Validation

on:
  workflow_dispatch:
    inputs:
      generator_mode:
        description: Generator mode for draft rebuild automation
        required: true
        default: reset
        type: choice
        options:
          - reset
          - scaffold_only
  pull_request:
    paths:
      - "app/**"
      - "public/**"
      - "scripts/scaffold-eden-readiness.mjs"
      - "scripts/reset-eden-generator.mjs"
      - "scripts/validate-*.mjs"
      - "docs/max_bootstrap/**"
      - "docs/avatars/**"
      - "docs/agents/**"
      - "docs/content/**"
      - "assets/eden-agents/**"
      - "config/**"
      - "workflows/eden-skye/**"
      - "package.json"
      - ".github/workflows/eden-readiness-cloud.yml"

permissions:
  contents: read

env:
  EDEN_ACTIVATION_STATUS: STUB_ONLY
  EDEN_HUMAN_GATE_REQUIRED: "true"
  EDEN_VISUAL_SOURCE_LOCK_REQUIRED: "true"

jobs:
  scaffold-and-validate:
    name: Reset generator, build, and validate Eden system
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Verify locked visual source truth before generator reset
        run: npm test

      - name: Run draft-only generator reset
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.generator_mode == 'reset' }}
        run: npm run generator:reset

      - name: Run draft-only scaffold generator
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.generator_mode == 'scaffold_only' }}
        run: npm run scaffold:eden

      - name: Run Next.js production build
        run: npm run build

      - name: Run validation suite
        run: |
          npm run validate:eden
          npm run validate:eden:avatars
          npm run validate:eden:content
          npm run validate:eden:config
          npm test

      - name: Guard generated surfaces against live activation markers
        run: |
          SCAN_TARGETS="app config workflows scripts docs/max_bootstrap docs/avatars docs/agents docs/content assets/eden-agents public"
          ! grep -R "ACTIVE_POSTING\": true" $SCAN_TARGETS
          ! grep -R "DEPLOY_NOW\": true" $SCAN_TARGETS
          ! grep -R "auto_publish\": true" $SCAN_TARGETS
          ! grep -R "SUPABASE_SERVICE_ROLE" $SCAN_TARGETS
          ! grep -R "OPENAI_API_KEY" $SCAN_TARGETS

      - name: Upload generated scaffold artifact
        uses: actions/upload-artifact@v4
        with:
          name: eden-readiness-scaffold
          path: |
            docs/max_bootstrap
            docs/avatars
            docs/agents
            docs/content
            config
            workflows/eden-skye
            app/api/eden
            app/admin/eden
            supabase/migrations/0001_eden_skye_readiness_scaffold.sql
            assets/eden-agents
            data/factory/receipts/eden-generator-reset-latest.json
          if-no-files-found: error
