name: Eden Materialize Generated Assets

on:
  workflow_dispatch:
  push:
    branches:
      - eden/readiness-scaffold-20260604
    paths:
      - scripts/materialize-generated-eden-assets.mjs
      - .github/workflows/eden-materialize-generated-assets.yml

permissions:
  contents: write

jobs:
  materialize-assets:
    name: Materialize generated standalone assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout draft branch
        uses: actions/checkout@v4
        with:
          ref: eden/readiness-scaffold-20260604

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download generated image assets
        run: node scripts/materialize-generated-eden-assets.mjs

      - name: Commit materialized assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/eden/generated
          if git diff --cached --quiet; then
            echo "No generated asset changes to commit."
          else
            git commit -m "Materialize generated Eden standalone assets"
            git push origin HEAD:eden/readiness-scaffold-20260604
          fi
